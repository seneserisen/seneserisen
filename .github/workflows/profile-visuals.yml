name: Generate Profile Visuals

on:
  schedule:
    - cron: "15 0 * * 0" # Weekly, Sunday at 00:15 UTC
  workflow_dispatch:

concurrency:
  group: profile-visuals
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit generated visuals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/ output/
          git diff --staged --quiet || git commit -m "chore: update profile visuals"
          git pull --rebase origin main
          git push
